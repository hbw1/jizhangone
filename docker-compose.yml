services:
  postgres:
    image: postgres:16-alpine
    container_name: hongyun-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hongyun
      POSTGRES_USER: hongyun
      POSTGRES_PASSWORD: hongyun
    ports:
      - "5432:5432"
    volumes:
      - hongyun_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hongyun -d hongyun"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: hongyun-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  hongyun_pgdata:
